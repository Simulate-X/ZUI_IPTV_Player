<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ZUI IPTV · Premium UI Konseptleri</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..700;1,6..72,200..700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; font-family: "Outfit", system-ui, sans-serif; background: #f0eee9; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Concepts + data + blueprint renderer -->
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="concept-apple.jsx"></script>
  <script type="text/babel" src="concept-cyber.jsx"></script>
  <script type="text/babel" src="concept-aurora.jsx"></script>
  <script type="text/babel" src="blueprint.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel">
    const { AppleTV, Cyber, Aurora, Blueprint, BLUEPRINT_META, APPLE_BLUEPRINT, CYBER_BLUEPRINT, AURORA_BLUEPRINT } = window;

    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="previews"
            title="Live Previews · 1920×1080"
            subtitle="Üç konsept de mevcut DOM iskeletini birebir kullanıyor — yalnızca className değerleri değişiyor. Pan/zoom için fareyle sürükle, scroll ile yaklaştır. Bir artboard'u tam ekran açmak için ↗ ikonuna tıkla."
          >
            <DCArtboard id="apple-preview" label="01 · Apple TV Elegance" width={1920} height={1080}>
              <AppleTV />
            </DCArtboard>
            <DCArtboard id="cyber-preview" label="02 · Cyber / Neon Premium" width={1920} height={1080}>
              <Cyber />
            </DCArtboard>
            <DCArtboard id="aurora-preview" label="03 · Aurora Spatial (özgün)" width={1920} height={1080}>
              <Aurora />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="blueprints"
            title="Class Maps · hangi <div> hangi className?"
            subtitle="Her konsept için iskeletteki her node'un alacağı className değerini birebir listeledim. Aynı sıra, aynı yorum satırları — sen sadece kopyala / yapıştır."
          >
            <DCArtboard id="apple-map" label="01 · Apple TV — Class Map" width={1100} height={1600}>
              <Blueprint {...BLUEPRINT_META.apple} blueprint={APPLE_BLUEPRINT} />
            </DCArtboard>
            <DCArtboard id="cyber-map" label="02 · Cyber — Class Map" width={1100} height={1600}>
              <Blueprint {...BLUEPRINT_META.cyber} blueprint={CYBER_BLUEPRINT} />
            </DCArtboard>
            <DCArtboard id="aurora-map" label="03 · Aurora — Class Map" width={1100} height={1600}>
              <Blueprint {...BLUEPRINT_META.aurora} blueprint={AURORA_BLUEPRINT} />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
